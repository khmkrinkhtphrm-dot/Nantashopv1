databases:
  - name: nantashop-db
    databaseName: nantashop
    user: nanta
    plan: free

services:
  - type: web
    name: nantashop-api
    plan: free
    runtime: node
    rootDir: .
    buildCommand: pnpm install --no-frozen-lockfile && pnpm --filter @workspace/game-shop run build && pnpm --filter @workspace/api-server run build
    startCommand: sh scripts/start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PNPM_VERSION
        value: 10.26.1
      - key: DATABASE_URL
        fromDatabase:
          name: nantashop-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
